default:
  image: ubuntu:latest

stages:
  - build
  - test
  - upload
  - release

variables:
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/c47/${CI_COMMIT_TAG}"
  GIT_SUBMODULE_STRATEGY: recursive
  DEBIAN_FRONTEND: noninteractive

macOS:
  stage: build
  image: macos-12-xcode-14
  script:
    - HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_CLEANUP=1 HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 brew install ccache ninja python@3.9 gtk+3 gmp pulseaudio
    - python3 -m pip install meson
    - make dist_macos
  artifacts:
    expire_in: 1 day
    paths:
      - c47-macos.zip
  tags:
    - saas-macos-medium-m1

linux:
  stage: build
  script:
    - apt-get update -qq
    - apt-get install -qq -y git python3-pip python3-mesonpy ninja-build pkg-config build-essential libgtk-3-dev libgmp-dev libpulse-dev zip
    - make dist_linux
  artifacts:
    expire_in: 1 day
    paths:
      - c47-linux.zip
  tags:
    - saas-linux-small-amd64

windows:
  stage: build
  script:
    - C:\msys64\msys2_shell.cmd -defterm -mingw64 -no-start -here -c "make dist_windows"
  artifacts:
    expire_in: 1 day
    paths:
      - c47-windows.zip
  tags:
    - c47_windows

dmcp:
  stage: build
  script:
    - apt-get update -qq
    - apt-get install -qq -y git python3-pip python3-mesonpy ninja-build pkg-config build-essential zip libgtk-3-dev libgmp-dev gcc-arm-none-eabi
    - make dist_dmcp
  artifacts:
    expire_in: 1 day
    paths:
      - c47-dmcp.zip
  tags:
    - saas-linux-small-amd64

dmcp5:
  stage: build
  script:
    - apt-get update -qq
    - apt-get install -qq -y git python3-pip python3-mesonpy ninja-build pkg-config build-essential zip libgtk-3-dev libgmp-dev gcc-arm-none-eabi
    - make dist_dmcp5
  artifacts:
    expire_in: 1 day
    paths:
      - c47-dmcp5.zip
  tags:
    - saas-linux-small-amd64

testSuite:
  stage: test
  script:
    - apt-get update -qq
    - apt-get install -qq -y git python3-pip python3-mesonpy ninja-build pkg-config build-essential libgtk-3-dev libgmp-dev
    - make test
  tags:
    - saas-linux-small-amd64

codeDocs:
  stage: test
  script:
    - apt-get update -qq
    - apt-get install -qq -y git python3-pip python3-mesonpy python3-breathe ninja-build pkg-config build-essential libgtk-3-dev libgmp-dev doxygen
    - python3 -m pip install 'Sphinx<7.2' furo --break-system-packages
    - make docs

upload:
  stage: upload
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file c47-dmcp.zip ${PACKAGE_REGISTRY_URL}/c47-dmcp-${CI_COMMIT_TAG}.zip
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file c47-macos.zip ${PACKAGE_REGISTRY_URL}/c47-macos-${CI_COMMIT_TAG}.zip
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file c47-linux.zip ${PACKAGE_REGISTRY_URL}/c47-linux-${CI_COMMIT_TAG}.zip
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file c47-windows.zip ${PACKAGE_REGISTRY_URL}/c47-windows-${CI_COMMIT_TAG}.zip
  tags:
    - saas-linux-small-amd64

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      release-cli create --name "Release $CI_COMMIT_TAG" --tag-name $CI_COMMIT_TAG \
        --assets-link "{\"name\":\"Windows Simulator\",\"url\":\"${PACKAGE_REGISTRY_URL}/c47-windows-${CI_COMMIT_TAG}.zip\"}" \
        --assets-link "{\"name\":\"Linux Simulator\",\"url\":\"${PACKAGE_REGISTRY_URL}/c47-linux-${CI_COMMIT_TAG}.zip\"}" \
        #--assets-link "{\"name\":\"macOS Simulator\",\"url\":\"${PACKAGE_REGISTRY_URL}/c47-macos-${CI_COMMIT_TAG}.zip\"}" \
        --assets-link "{\"name\":\"Firmware for DMCP\",\"url\":\"${PACKAGE_REGISTRY_URL}/c47-dmcp-${CI_COMMIT_TAG}.zip\"}" \
  tags:
    - saas-linux-small-amd64
